openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Agenda Cultural de Ronda API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Cultural events operations
  - name: categories
    description: Event categories
  - name: resources
    description: Downloadable resources (PDFs, images, ZIP, documents)
  - name: Storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all cultural events
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: cancelled
          in: query
          required: false
          description: If true, return only cancelled events. If false or omitted, exclude cancelled events.
          schema:
            type: boolean
        - name: draft
          in: query
          required: false
          description: If true, return only draft events (publishedAt IS NULL).
          schema:
            type: boolean
        - name: scheduled
          in: query
          required: false
          description: If true, return only scheduled events (publishedAt in the future).
          schema:
            type: boolean
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "400":
          description: Invalid input

  /events/upcoming:
    get:
      operationId: listUpcomingEvents
      tags: [events]
      summary: List upcoming events in the next 30 days
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/calendar:
    get:
      operationId: getCalendarEvents
      tags: [events]
      summary: Get events grouped by date for calendar view
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Events grouped by date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarDay"

  /events/stats:
    get:
      operationId: getEventsStats
      tags: [events]
      summary: Get aggregate statistics about events
      responses:
        "200":
          description: Events statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsStats"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Event deleted
        "404":
          description: Not found

  /events/slug/{slug}:
    get:
      operationId: getEventBySlug
      tags: [events]
      summary: Get a single event by slug (for SEO-friendly URLs)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories with event counts
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Invalid input
        "409":
          description: Category already exists

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Category deleted
        "404":
          description: Not found
        "409":
          description: Category in use by events

  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List downloadable resources
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [published, draft, all]
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      tags: [resources]
      summary: Create a new resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceInput"
      responses:
        "201":
          description: Resource created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{id}:
    get:
      operationId: getResource
      tags: [resources]
      summary: Get a resource by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resource found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          description: Not found
    patch:
      operationId: updateResource
      tags: [resources]
      summary: Update a resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceUpdate"
      responses:
        "200":
          description: Resource updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          description: Not found
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Resource deleted
        "404":
          description: Not found

  /events/{id}/resources:
    get:
      operationId: getEventResources
      tags: [resources]
      summary: Get resources attached to an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    put:
      operationId: setEventResources
      tags: [resources]
      summary: Set resources attached to an event (replaces all)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachResourcesInput"
      responses:
        "200":
          description: Updated list of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"

  /posts/{id}/resources:
    get:
      operationId: getPostResources
      tags: [resources]
      summary: Get resources attached to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    put:
      operationId: setPostResources
      tags: [resources]
      summary: Set resources attached to a post (replaces all)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachResourcesInput"
      responses:
        "200":
          description: Updated list of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content
          content:
            '*/*':
              schema:
                type: string
                format: binary

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Event:
      type: object
      required:
        - id
        - title
        - categories
        - date
        - location
        - slug
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
          default: []
        date:
          type: string
          format: date
        endDate:
          type: ["string", "null"]
          format: date
          description: Optional end date for multi-day events. If set, the event runs from `date` through `endDate` inclusive.
        time:
          type: ["string", "null"]
          description: Hora de apertura/inicio del primer turno (HH:MM).
        endTime:
          type: ["string", "null"]
          description: Hora de cierre del primer turno (HH:MM). Opcional.
        time2:
          type: ["string", "null"]
          description: Hora de apertura del segundo turno (tarde). Opcional.
        endTime2:
          type: ["string", "null"]
          description: Hora de cierre del segundo turno (tarde). Opcional.
        location:
          type: string
        imageUrl:
          type: ["string", "null"]
        imageAlt:
          type: ["string", "null"]
        featured:
          type: boolean
        ogTitle:
          type: ["string", "null"]
        ogDescription:
          type: ["string", "null"]
        ogImage:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        ticketUrl:
          type: ["string", "null"]
        organizer:
          type: ["string", "null"]
        gallery:
          type: array
          items:
            type: string
          default: []
        cancelled:
          type: boolean
          default: false
          description: If true, the event is cancelled and excluded from active listings.
        cancellationReason:
          type: ["string", "null"]
          description: Optional explanation shown on the event page when cancelled.
        likes:
          type: integer
          default: 0
          description: Number of times users have liked this event.
        publishedAt:
          type: ["string", "null"]
          format: date-time
          description: When null the event is a draft. When set to a future datetime the event is scheduled. When set to a past datetime (or now) the event is visible publicly.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EventInput:
      type: object
      required:
        - title
        - categories
        - date
        - location
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        categories:
          type: array
          items:
            type: string
        date:
          type: string
          format: date
        endDate:
          type: string
          format: date
        time:
          type: string
        endTime:
          type: string
        time2:
          type: string
        endTime2:
          type: string
        location:
          type: string
        imageUrl:
          type: string
        imageAlt:
          type: string
        featured:
          type: boolean
        ogTitle:
          type: string
        ogDescription:
          type: string
        ogImage:
          type: string
        price:
          type: string
        ticketUrl:
          type: string
        organizer:
          type: string
        gallery:
          type: array
          items:
            type: string
        cancelled:
          type: boolean
        cancellationReason:
          type: string
        publishedAt:
          type: ["string", "null"]
          format: date-time

    EventUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        categories:
          type: array
          items:
            type: string
        date:
          type: string
          format: date
        endDate:
          type: ["string", "null"]
          format: date
        time:
          type: ["string", "null"]
        endTime:
          type: ["string", "null"]
        time2:
          type: ["string", "null"]
        endTime2:
          type: ["string", "null"]
        location:
          type: string
        imageUrl:
          type: string
        imageAlt:
          type: string
        featured:
          type: boolean
        ogTitle:
          type: string
        ogDescription:
          type: string
        ogImage:
          type: string
        price:
          type: string
        ticketUrl:
          type: string
        organizer:
          type: string
        gallery:
          type: array
          items:
            type: string
        cancelled:
          type: boolean
        cancellationReason:
          type: ["string", "null"]
        publishedAt:
          type: ["string", "null"]
          format: date-time

    Category:
      type: object
      required:
        - name
        - count
        - color
        - icon
      properties:
        id:
          type: ["integer", "null"]
        name:
          type: string
        count:
          type: integer
        color:
          type: string
          description: Hex color (e.g. "#5C6B3A").
        icon:
          type: string
          description: Lucide icon key (e.g. "Music", "Tag").
        sortOrder:
          type: ["integer", "null"]

    CategoryInput:
      type: object
      required:
        - name
        - color
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
          description: Hex color.
        icon:
          type: string
          description: Lucide icon key. Defaults to "Tag".
        sortOrder:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
        icon:
          type: string
        sortOrder:
          type: integer

    CalendarDay:
      type: object
      required:
        - date
        - events
      properties:
        date:
          type: string
          format: date
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"

    EventsStats:
      type: object
      required:
        - total
        - upcoming
        - byCategory
        - thisMonth
      properties:
        total:
          type: integer
        upcoming:
          type: integer
        thisMonth:
          type: integer
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    Resource:
      type: object
      required: [id, title, slug, fileUrl, fileType, category, featured, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        fileUrl:
          type: string
          description: Object path for the stored file (e.g. /objects/uploads/uuid)
        fileType:
          type: string
          description: "pdf | image | zip | doc"
        coverImageUrl:
          type: ["string", "null"]
        category:
          type: string
          description: "Revistas | Programas | Itinerarios | Dossiers | Cartelería | Otros"
        featured:
          type: boolean
        publishedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResourceInput:
      type: object
      required: [title, fileUrl, fileType, category]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        fileUrl:
          type: string
        fileType:
          type: string
        coverImageUrl:
          type: ["string", "null"]
        category:
          type: string
        featured:
          type: boolean
        publishedAt:
          type: ["string", "null"]
          format: date-time

    ResourceUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        fileUrl:
          type: string
        fileType:
          type: string
        coverImageUrl:
          type: ["string", "null"]
        category:
          type: string
        featured:
          type: boolean
        publishedAt:
          type: ["string", "null"]
          format: date-time

    AttachResourcesInput:
      type: object
      required: [resourceIds]
      properties:
        resourceIds:
          type: array
          items:
            type: integer
          description: IDs of resources to attach

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
